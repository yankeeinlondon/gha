name: On Push

on:
  push:
    branches:
      - main
jobs:
  test:
    name: testing
    uses: yankeeinlondon/gha/.github/workflows/test.yml@main
    with:
        nodeVersion: 22
        os: ubuntu-latest
        
    # Example: To test only on Linux with Node 20.x, uncomment below:
    # with:
    #   os: 'ubuntu-latest'
    #   nodeVersion: '20.x'

  publish:
    name: publish
    if: contains(github.event.head_commit.message, 'release v')
    needs: test  # This ensures tests pass before publishing
    # A caller `permissions:` block becomes the CEILING for every nested job in the
    # reusable workflow, so it must be the union of what they each need:
    #   id-token: write  -> npm + JSR Trusted Publishing (OIDC)
    #   contents: write  -> publish_success (changelog) and publish_failure (tag removal)
    #   packages: write  -> publish_github (GitHub Packages)
    permissions:
      id-token: write
      contents: write
      packages: write
    uses: yankeeinlondon/gha/.github/workflows/publish.yml@main
    # Example: To use different package names per platform, uncomment below:
    # with:
    #   jsr_scope: '@yankeeinlondon'
    #   github_packages_scope: '@yankeeinlondon'
    # NPM_TOKEN is optional: when absent, npm publishing uses Trusted Publishing (OIDC).
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

