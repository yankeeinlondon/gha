# Controls which dependencies may run install/build scripts.
# CI installs the latest pnpm (v11+), which reads `allowBuilds` here and ignores
# the `pnpm` field in package.json; it also defaults strictDepBuilds:true, so any
# unreviewed build script is a hard error (ERR_PNPM_IGNORED_BUILDS).
#   esbuild -> needs its postinstall to fetch its platform binary (pulled in by tsx/vite)
allowBuilds:
  esbuild: true
